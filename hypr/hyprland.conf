source = ~/.config/hypr/mocha.conf

$active = $color1
$inactive = $color2
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/

#monitor=eDP-1,disable
#monitor=eDP-1,preferred,auto,auto
#monitor=HDMI-A-1,3840x2160@144.050003,auto,1.5
#monitor=DP-3,disable

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
#exec-once = sh .config/hypr/scripts/nvidia.sh
exec-once = nm-applet
exec-once = wayland-pipewire-idle-inhibit
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = hyprpaper
exec-once = pywalfox start

#exec-once = wal -R

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$browser = firefox
$menu = rofi -show drun

# Some default env vars.
env = XCURSOR_SIZE,24
env = HYPRLAND_LOG_WLR, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = WLR_NO_HARDWARE_CURSORS, 1
env = XDG_SESSION_TYPE, wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GBM_BACKEND, nvidia-drm #here
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = WLR_DRM_DEVICES,/dev/dri/card1
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# cursor {
#     no_hardware_cursors = true
# }

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        disable_while_typing = yes
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    col.active_border = $mauve
    col.inactive_border = $base
    gaps_in = 5
    gaps_out = 10
    border_size = 1

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    #inactive_timeout = 12

}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0

    blur {
        enabled = true
        size = 4
        passes = 3
        ignore_opacity = true
        new_optimizations = true
    }

#    drop_shadow = yes
#    shadow_range = 16
#    shadow_render_power = 5
#    col.shadow_inactive = 0
#    col.shadow = rgba(1a1a1aee)
}

animations {
  enabled = yes

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  bezier = linear, 0.0, 0.0, 1.0, 1.0
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = slow, 0, 0.85, 0.3, 1
  bezier = overshot, 0.7, 0.6, 0.1, 1.1
  bezier = bounce, 1.1, 1.6, 0.1, 0.85
  bezier = sligshot, 1, -1, 0.15, 1.25
  bezier = nice, 0, 6.9, 0.5, -4.20

  animation = windowsIn, 1, 5, slow, popin
  animation = windowsOut, 1, 5, winOut, popin
  animation = windowsMove, 1, 5, wind, slide
  animation = fade, 1, 5, overshot
  animation = workspaces, 1, 5, wind
  animation = windows, 1, 5, bounce, popin
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
   # new_is_master = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_splash_rendering = false
    vrr = 1
    col.splash = 0xffffffff
    splash_font_family = Roboto

}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

#alt tab
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# Screen brightness control
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Volume control
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle


#waybar
bind = $mainMod SHIFT, M, exec, killall waybar -q && waybar

#hyprpaper
bind = $mainMod SHIFT, W, exec, killall hyprpaper -q && hyprpaper

#wlogout
bind = $mainMod, ESCAPE, exec, .config/hypr/scripts/log-screen

#hyprlock
bind = $mainMod, L, exec, hyprlock

#clipboard
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

#screenshot
bind = , Print, exec, ~/.config/hypr/scripts/screenshot

#notification center
bind = $mainMod, N, exec, swaync-client -t -sw

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exit,
bind = $mainMod, T, exec, $fileManager
bind = $mainMod, R, exec, zathura
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $browser
#bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, K, exec, /home/aaron/.config/kanri/kanri_0.8.0_amd64.AppImage

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

# Generated windows.
windowrule = float, title:^(Rofi)
windowrule = float, title:^(?:Open|Save)
windowrule = float, title:^(?:File|Folder|As)$
windowrule = float, title:Open File
windowrule = float, title:branchdialog
windowrule = float, title:branchdialog
windowrule = float, nwg-look
windowrule = float, nm-connection-editor
windowrule = center, nm-connection-editor
windowrule = float, org.fcitx.fcitx5-config-qt
windowrule = center, org.fcitx.fcitx5-config-qt
windowrule = size 850 425, xdg-desktop-portal-gtk
windowrule = float, xdg-desktop-portal-gtk
windowrule = float, title:^(File Operation Progress)$
windowrulev2 = move onscreen cursor, title:^(TITLE)$, class:^(CLASS)$
windowrulev2 = opacity 0.85, 0.85, class:^(discord)
#windowrulev2 = opacity 0.85, 0.85, class:^(firefox)
windowrulev2 = opacity 0.85, 0.85, class:^(discord)
windowrulev2 = opacity 0.85, 0.85, class:^(code-oss)


#wofi blur / animation
layerrule = blur, wofi
layerrule = ignorezero, wofi
layerrule = animation popin, wofi

#notifications blur / animation

layerrule = animation slide right, swaync-notification-window
layerrule = animation slide right, swaync-control-center


layerrule = blur, ^(.*)$
layerrule = ignorealpha 0.5, ^(.*)$
layerrule = ignorezero 0.5, ^(.*)$

xwayland {
     force_zero_scaling = true
}
