preload = ~/.config/wallpapers/wallpaper.png
preload = ~/.config/wallpapers/763931.png
preload = ~/.config/wallpapers/windows-error.jpg
preload = ~/.config/wallpapers/linux-chan.png

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
wallpaper = eDP-1,~/.config/wallpapers/linux-chan.png
wallpaper = HDMI-A-1,~/.config/wallpapers/linux-chan.png
#enable splash text rendering over the wallpaper
splash = false

#fully disable ipc
# ipc = off


